name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          bison \
          flex \
          libgmp3-dev \
          libmpc-dev \
          libmpfr-dev \
          texinfo \
          libisl-dev \
          wget \
          curl \
          nasm

    - name: Restore cached toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: ~/cross
        key: ${{ runner.os }}-x86_64-elf-toolchain-v1

    - name: Build x86_64-elf toolchain (if not cached)
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        export PREFIX="$HOME/cross"
        export TARGET=x86_64-elf
        export PATH="$PREFIX/bin:$PATH"

        mkdir -p $HOME/src
        cd $HOME/src

        wget https://ftp.gnu.org/gnu/binutils/binutils-2.42.tar.gz
        wget https://ftp.gnu.org/gnu/gcc/gcc-14.1.0/gcc-14.1.0.tar.gz

        tar -xf binutils-2.42.tar.gz
        tar -xf gcc-14.1.0.tar.gz

        # Build binutils
        mkdir build-binutils && cd build-binutils
        ../binutils-2.42/configure \
          --target=$TARGET \
          --prefix=$PREFIX \
          --with-sysroot \
          --disable-nls \
          --disable-werror
        make -j$(nproc)
        make install
        cd ..

        # Build GCC
        mkdir build-gcc && cd build-gcc
        ../gcc-14.1.0/configure \
          --target=$TARGET \
          --prefix=$PREFIX \
          --disable-nls \
          --enable-languages=c \
          --without-headers
        make -j$(nproc) all-gcc
        make -j$(nproc) all-target-libgcc
        make install-gcc
        make install-target-libgcc

    - name: Add toolchain to PATH
      run: echo "$HOME/cross/bin" >> $GITHUB_PATH

    - name: Build
      run: make

    - name: Run check
      run: make check

    - name: Run distcheck
      run: make distcheck

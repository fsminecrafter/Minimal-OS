name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          bison \
          flex \
          libgmp3-dev \
          libmpc-dev \
          libmpfr-dev \
          texinfo \
          libisl-dev \
          wget \
          curl \
          nasm


    - name: Restore cached toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: ~/cross
        key: ${{ runner.os }}-x86_64-elf-toolchain-gcc14.1.0-binutils2.42
    
    - name: Verify toolchain
      run: |
        if [ ! -f "$HOME/cross/bin/x86_64-elf-gcc" ]; then
          echo "CACHE_INVALID=true" >> $GITHUB_ENV
        fi
    
    - name: Build x86_64-elf toolchain (if needed)
      if: steps.cache-toolchain.outputs.cache-hit != 'true' || env.CACHE_INVALID == 'true'
      run: |
        export PREFIX="$HOME/cross"
        export TARGET=x86_64-elf
        export PATH="$PREFIX/bin:$PATH"
    
        mkdir -p $HOME/src
        cd $HOME/src
    
        wget -nc https://ftp.gnu.org/gnu/binutils/binutils-2.42.tar.gz
        wget -nc https://ftp.gnu.org/gnu/gcc/gcc-14.1.0/gcc-14.1.0.tar.gz
    
        tar -xf binutils-2.42.tar.gz || true
        tar -xf gcc-14.1.0.tar.gz || true
          
    - name: Add toolchain to PATH
      run: echo "$HOME/cross/bin" >> $GITHUB_PATH

    - name: Build
      run: make

    - name: Run check
      run: make check

    - name: Run distcheck
      run: make distcheck
